spring.application.name=myspringboot
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/questiondb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate dialect for MySQL (Hibernate 6/7)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Automatically update the database schema (use 'validate' or 'none' in production)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
